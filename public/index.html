<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./app-config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; width:100%; overflow:hidden; }
#root { width:100%; height:100%; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(120,90,60,.2); border-radius:99px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ── Config & persistence ──────────────────────────────────────
const CONFIG = window.FINANZAS_CONFIG || {};
const SUPABASE_ENABLED = Boolean(CONFIG.supabaseUrl && CONFIG.supabaseAnonKey && window.supabase?.createClient);
const DB = {
  get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

// ── Theme ─────────────────────────────────────────────────────
const THEMES = {
  light: {
    bg:'#f3f0e8', bgSoft:'#ebe6d9', surface:'#ffffff', surfaceAlt:'#faf7ef',
    border:'rgba(60,45,30,0.10)', borderStrong:'rgba(60,45,30,0.16)',
    text:'#1c1410', text2:'#6b5a48', muted:'#9c8a76',
    accent:'#7a4f2e', accentSoft:'#d4c5a9', accentBg:'#ede2cd',
    pos:'#3f6b3a', posSoft:'#dee8d2', neg:'#a13a2a', negSoft:'#f0d9d2',
    chartA:'#7a4f2e', chartB:'#c9a878', chartC:'#4a3a2c',
    grid:'rgba(60,45,30,0.06)',
    cardShadow:'0 1px 0 rgba(255,255,255,0.7) inset, 0 30px 60px -20px rgba(60,40,20,0.18), 0 8px 20px -10px rgba(60,40,20,0.10)',
    chip:'rgba(60,45,30,0.05)', inputBg:'#f3ede3',
  },
  dark: {
    bg:'#171311', bgSoft:'#1f1a16', surface:'#221c18', surfaceAlt:'#1b1612',
    border:'rgba(220,200,170,0.08)', borderStrong:'rgba(220,200,170,0.14)',
    text:'#f5ede0', text2:'#bda893', muted:'#7d6c5a',
    accent:'#d4a574', accentSoft:'#8a6841', accentBg:'rgba(212,165,116,0.12)',
    pos:'#9bc285', posSoft:'rgba(155,194,133,0.14)', neg:'#d97968', negSoft:'rgba(217,121,104,0.14)',
    chartA:'#d4a574', chartB:'#a07f55', chartC:'#e8d4b0',
    grid:'rgba(220,200,170,0.06)',
    cardShadow:'0 1px 0 rgba(255,240,210,0.04) inset, 0 30px 60px -20px rgba(0,0,0,0.6), 0 8px 24px -12px rgba(0,0,0,0.5)',
    chip:'rgba(220,200,170,0.06)', inputBg:'#2a211c',
  }
};

// ── Constants ─────────────────────────────────────────────────
const CAT_META = {
  nomina:      { label:'Nómina',       color:'#7a4f2e' },
  refacciones: { label:'Refacciones',  color:'#c9a878' },
  gasolina:    { label:'Combustible',  color:'#a07f55' },
  servicios:   { label:'Servicios',    color:'#dec8a4' },
  renta:       { label:'Renta',        color:'#8c6b48' },
  herramientas:{ label:'Herramientas', color:'#e6d6b8' },
  otros:       { label:'Otros',        color:'#b8a89a' },
};
const PAGES = [
  { key:'dashboard',   label:'Dashboard',     sub:'Resumen ejecutivo del mes actual' },
  { key:'comparativo', label:'Comparativo',   sub:'Tendencias y balance mes a mes' },
  { key:'ingresos',    label:'Ingresos',      sub:'Registro de pagos recibidos' },
  { key:'gastos',      label:'Gastos',        sub:'Nómina y gastos operativos' },
  { key:'categorias',  label:'Por categoría', sub:'Dónde se concentra el gasto' },
  { key:'clientes',    label:'Por cliente',   sub:'Quién aporta más al ingreso' },
];
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// ── Utils ─────────────────────────────────────────────────────
const fmt = n => '$' + (n||0).toLocaleString('es-MX', { maximumFractionDigits:0 });
const fmtCompact = n => {
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + Math.round(n||0);
};
const mesLabel = p => {
  if (!p) return '—';
  const [y, mo] = p.split('-');
  return `${MESES[parseInt(mo)-1]} ${y.slice(2)}`;
};
const fmtFecha = iso => {
  if (!iso) return '—';
  const [y, mo, d] = iso.split('-');
  return `${parseInt(d)} ${MESES[parseInt(mo)-1]} ${y.slice(2)}`;
};
const hoy = () => new Date().toISOString().slice(0,10);
const mesPeriodo = () => new Date().toISOString().slice(0,7);
const anoActual = () => new Date().getFullYear().toString();

// ── Shared style helpers ──────────────────────────────────────
const cardS = (t, extra={}) => ({ background:t.surface, border:`1px solid ${t.border}`, borderRadius:18, padding:22, boxShadow:t.cardShadow, ...extra });
const kpiLabel = t => ({ fontSize:11.5, color:t.muted, fontWeight:600, letterSpacing:'0.4px', textTransform:'uppercase' });
const kpiVal = t => ({ fontFamily:"'Fraunces',serif", fontSize:30, fontWeight:500, letterSpacing:'-0.6px', marginTop:10, lineHeight:1 });
const pillS = (t, on) => ({
  all:'unset', cursor:'pointer', padding:'6px 14px', borderRadius:99,
  fontSize:12.5, fontWeight:500,
  background: on ? t.accentBg : 'transparent',
  color: on ? t.accent : t.text2,
  border:`1px solid ${on ? t.accent+'33' : t.border}`,
});
const primaryBtn = t => ({
  all:'unset', cursor:'pointer', padding:'9px 16px', borderRadius:12,
  background:t.text, color:t.bg, fontSize:13, fontWeight:600,
});
const iconBtn = t => ({
  all:'unset', cursor:'pointer', width:28, height:28, borderRadius:8,
  display:'inline-flex', alignItems:'center', justifyContent:'center', color:t.muted,
});
const inputS = t => ({
  all:'unset', display:'block', width:'100%', padding:'10px 13px',
  background:t.inputBg, border:`1px solid ${t.border}`, borderRadius:12,
  color:t.text, fontSize:14, fontFamily:"'Inter',system-ui,sans-serif",
});
const selectS = t => ({ ...inputS(t) });
const tableS = { width:'100%', borderCollapse:'separate', borderSpacing:0 };

// ── Icons ─────────────────────────────────────────────────────
const IcoBar = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><rect x="2" y="2" width="5" height="6" rx="1"/><rect x="9" y="2" width="5" height="4" rx="1"/><rect x="2" y="10" width="5" height="4" rx="1"/><rect x="9" y="8" width="5" height="6" rx="1"/></svg>;
const IcoTrend = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M2 14L7 8L10 11L14 4"/><path d="M11 4H14V7" strokeLinecap="round"/></svg>;
const IcoUp = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M8 14V3M3 8L8 3L13 8" strokeLinecap="round"/></svg>;
const IcoDown = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M8 2V13M3 8L8 13L13 8" strokeLinecap="round"/></svg>;
const IcoTag = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M2 7V3C2 2.4 2.4 2 3 2H7L14 9L9 14L2 7Z"/><circle cx="5.5" cy="5.5" r=".9" fill="currentColor"/></svg>;
const IcoUser = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="8" cy="6" r="2.5"/><path d="M3 14C3 11 5 9.5 8 9.5C11 9.5 13 11 13 14"/></svg>;
const IcoTrash = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 4h10M6 4V3a1 1 0 011-1h2a1 1 0 011 1v1M5 4l1 9a1 1 0 001 1h2a1 1 0 001-1l1-9" strokeLinecap="round"/></svg>;
const IcoSearch = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L13.5 13.5" strokeLinecap="round"/></svg>;
const IcoX = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 3l10 10M13 3L3 13" strokeLinecap="round"/></svg>;
const IcoKey = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="6" cy="8" r="3.5"/><path d="M9 8h5M12 6v4" strokeLinecap="round"/></svg>;

// ════════════════════════════════════════════════════════════
// APP
// ════════════════════════════════════════════════════════════
function App() {
  const [mode, setMode] = useState('light');
  const [page, setPage] = useState('dashboard');
  const [ingresos, setIngresos] = useState(() => DB.get('fp_ingresos', []));
  const [gastos, setGastos]     = useState(() => DB.get('fp_gastos', []));
  const [supaClient, setSupaClient] = useState(null);
  const [currentUser, setCurrentUser] = useState(null);
  const [syncStatus, setSyncStatus] = useState('idle');
  const [lastSync, setLastSync] = useState(null);
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);
  const t = THEMES[mode];

  // ── Supabase init
  useEffect(() => {
    if (!SUPABASE_ENABLED) return;
    const client = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);
    setSupaClient(client);
    client.auth.getSession().then(({ data: { session } }) => {
      const user = session?.user || null;
      setCurrentUser(user);
      if (user) loadCloud(client, user);
    });
    const { data: { subscription } } = client.auth.onAuthStateChange(async (event, session) => {
      const user = session?.user || null;
      setCurrentUser(user);
      if (event === 'SIGNED_IN' && user) {
        await loadCloud(client, user);
        setModal(null);
        showToast('Sesión iniciada', 'ok');
      }
      if (event === 'SIGNED_OUT') showToast('Sesión cerrada', 'info');
    });
    return () => subscription.unsubscribe();
  }, []);

  const persistLocal = (ing, gast) => {
    DB.set('fp_ingresos', ing);
    DB.set('fp_gastos', gast);
  };

  const saveCloud = async (client, user, ing, gast) => {
    setSyncStatus('syncing');
    const ingRows = ing.map(x => ({
      user_id:user.id, cliente:x.cliente, monto:x.monto, fecha:x.fecha,
      periodo:x.periodo, concepto:x.concepto||null, notas:x.notas||null
    }));
    const gastRows = gast.map(x => ({
      user_id:user.id, categoria:x.categoria, monto:x.monto, fecha:x.fecha,
      periodo:x.periodo, descripcion:x.descripcion, otros_detalle:x.otrosDetalle||null, notas:x.notas||null
    }));
    const [{ error:e1 }, { error:e2 }] = await Promise.all([
      client.from('ingresos').delete().eq('user_id', user.id),
      client.from('gastos').delete().eq('user_id', user.id),
    ]);
    if (e1 || e2) throw new Error('Error limpiando datos');
    if (ingRows.length) { const { error } = await client.from('ingresos').insert(ingRows); if (error) throw error; }
    if (gastRows.length) { const { error } = await client.from('gastos').insert(gastRows); if (error) throw error; }
    setSyncStatus('synced');
    setLastSync(new Date());
  };

  const loadCloud = async (client, user) => {
    setSyncStatus('syncing');
    const [{ data:ingData, error:e1 }, { data:gastData, error:e2 }] = await Promise.all([
      client.from('ingresos').select('*').eq('user_id', user.id).order('fecha', { ascending:false }),
      client.from('gastos').select('*').eq('user_id', user.id).order('fecha', { ascending:false }),
    ]);
    if (e1 || e2) { setSyncStatus('error'); return; }
    const ing = (ingData||[]).map(r => ({ id:r.id, cliente:r.cliente, monto:Number(r.monto), fecha:r.fecha, periodo:r.periodo, concepto:r.concepto||'', notas:r.notas||'' }));
    const gast = (gastData||[]).map(r => ({ id:r.id, categoria:r.categoria, monto:Number(r.monto), fecha:r.fecha, periodo:r.periodo, descripcion:r.descripcion, otrosDetalle:r.otros_detalle||'', notas:r.notas||'' }));
    setIngresos(ing); setGastos(gast);
    persistLocal(ing, gast);
    setSyncStatus('synced'); setLastSync(new Date());
  };

  const addIngreso = async data => {
    const newIng = { id: Date.now(), ...data };
    const next = [...ingresos, newIng];
    setIngresos(next); persistLocal(next, gastos);
    if (supaClient && currentUser) {
      try { await saveCloud(supaClient, currentUser, next, gastos); }
      catch { showToast('Guardado local. Sin conexión a la nube.', 'warn'); }
    }
    setModal(null); showToast('Ingreso registrado', 'ok');
  };

  const addGasto = async data => {
    const newGasto = { id: Date.now(), ...data };
    const next = [...gastos, newGasto];
    setGastos(next); persistLocal(ingresos, next);
    if (supaClient && currentUser) {
      try { await saveCloud(supaClient, currentUser, ingresos, next); }
      catch { showToast('Guardado local. Sin conexión a la nube.', 'warn'); }
    }
    setModal(null); showToast('Gasto registrado', 'ok');
  };

  const deleteIngreso = async id => {
    const next = ingresos.filter(x => x.id !== id);
    setIngresos(next); persistLocal(next, gastos);
    if (supaClient && currentUser) try { await saveCloud(supaClient, currentUser, next, gastos); } catch {}
  };

  const deleteGasto = async id => {
    const next = gastos.filter(x => x.id !== id);
    setGastos(next); persistLocal(ingresos, next);
    if (supaClient && currentUser) try { await saveCloud(supaClient, currentUser, ingresos, next); } catch {}
  };

  const logout = async () => { if (supaClient) await supaClient.auth.signOut(); };

  const showToast = (msg, type) => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  // ── Derived data
  const mes = mesPeriodo(), ano = anoActual();

  const series = useMemo(() => {
    const ps = new Set([...ingresos, ...gastos].map(x => x.periodo).filter(Boolean));
    if (!ps.size) return [];
    return [...ps].sort().map(p => ({
      mes: mesLabel(p), periodo: p,
      ing:  ingresos.filter(x => x.periodo === p).reduce((s,x) => s+x.monto, 0),
      gast: gastos.filter(x => x.periodo === p).reduce((s,x) => s+x.monto, 0),
    }));
  }, [ingresos, gastos]);

  const totals = useMemo(() => {
    const ingMes = ingresos.filter(x => x.periodo === mes).reduce((s,x) => s+x.monto, 0);
    const gastMes = gastos.filter(x => x.periodo === mes).reduce((s,x) => s+x.monto, 0);
    const prev = new Date(); prev.setMonth(prev.getMonth()-1);
    const pp = prev.toISOString().slice(0,7);
    const pIng = ingresos.filter(x => x.periodo === pp).reduce((s,x) => s+x.monto, 0);
    const pGast = gastos.filter(x => x.periodo === pp).reduce((s,x) => s+x.monto, 0);
    return {
      ingMes, gastMes, balanceMes: ingMes - gastMes,
      ingAno:  ingresos.filter(x => x.periodo?.startsWith(ano)).reduce((s,x) => s+x.monto, 0),
      gastAno: gastos.filter(x => x.periodo?.startsWith(ano)).reduce((s,x) => s+x.monto, 0),
      ingTotal: ingresos.reduce((s,x) => s+x.monto, 0),
      gastTotal: gastos.reduce((s,x) => s+x.monto, 0),
      deltaIng:  pIng  ? (ingMes  - pIng)  / pIng  * 100 : 0,
      deltaGast: pGast ? (gastMes - pGast) / pGast * 100 : 0,
    };
  }, [ingresos, gastos]);

  const movimientos = useMemo(() => [
    ...ingresos.map(x => ({ ...x, tipo:'in',  who:x.cliente, concept:x.concepto||'' })),
    ...gastos.map(x   => ({ ...x, tipo:'out', who:CAT_META[x.categoria]?.label||x.categoria, concept:x.descripcion })),
  ].sort((a,b) => b.fecha.localeCompare(a.fecha)).slice(0,8), [ingresos, gastos]);

  const categorias = useMemo(() => {
    const gastTotal = gastos.reduce((s,x) => s+x.monto, 0);
    return Object.keys(CAT_META).map(k => {
      const recs = gastos.filter(x => x.categoria === k);
      const total = recs.reduce((s,x) => s+x.monto, 0);
      return { key:k, ...CAT_META[k], total, count:recs.length, pct: gastTotal ? total/gastTotal*100 : 0,
        esteMes: recs.filter(x => x.periodo === mes).reduce((s,x) => s+x.monto, 0),
        esteAno: recs.filter(x => x.periodo?.startsWith(ano)).reduce((s,x) => s+x.monto, 0),
      };
    }).filter(c => c.total > 0).sort((a,b) => b.total - a.total);
  }, [gastos]);

  const clientes = useMemo(() => {
    const map = {};
    ingresos.forEach(x => {
      if (!map[x.cliente]) map[x.cliente] = { total:0, count:0, last:'' };
      map[x.cliente].total += x.monto; map[x.cliente].count++;
      if (x.fecha > map[x.cliente].last) map[x.cliente].last = x.fecha;
    });
    const ingTotal = ingresos.reduce((s,x) => s+x.monto, 0);
    return Object.entries(map).map(([name, v]) => ({ name, ...v, pct: ingTotal ? v.total/ingTotal*100 : 0 }))
      .sort((a,b) => b.total - a.total);
  }, [ingresos]);

  const syncLabel = () => {
    if (!currentUser) return 'Modo local';
    if (syncStatus === 'syncing') return 'Sincronizando…';
    if (syncStatus === 'synced' && lastSync) {
      const mins = Math.round((Date.now() - lastSync) / 60000);
      return mins < 1 ? 'Sincronizado ahora' : `Sincronizado · ${mins}m`;
    }
    if (syncStatus === 'error') return 'Error al sincronizar';
    return 'Sincronizado';
  };

  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, fontFamily:"'Inter',system-ui,sans-serif",
      color:t.text, display:'grid', gridTemplateColumns:'232px 1fr', overflow:'hidden' }}>
      <Sidebar t={t} page={page} setPage={setPage} currentUser={currentUser}
        onLogin={() => setModal('auth')} onLogout={logout} />
      <div style={{ overflow:'auto', background:t.bg }}>
        <TopBar t={t} mode={mode} setMode={setMode} page={PAGES.find(p=>p.key===page)}
          syncLabel={syncLabel()} syncStatus={syncStatus} currentUser={currentUser}
          onAddIng={() => setModal('ingreso')} onAddGast={() => setModal('gasto')} />
        <div style={{ padding:'24px 36px 48px' }}>
          {page !== 'dashboard' && <PageHeader t={t} meta={PAGES.find(p=>p.key===page)} mes={mes} />}
          {page === 'dashboard'   && <DashPage t={t} totals={totals} series={series} movimientos={movimientos} categorias={categorias} clientes={clientes} mes={mes} currentUser={currentUser} onAddIng={() => setModal('ingreso')} onAddGast={() => setModal('gasto')} />}
          {page === 'comparativo' && <ComparPage t={t} totals={totals} series={series} />}
          {page === 'ingresos'    && <IngPage t={t} ingresos={ingresos} mes={mes} ano={ano} onAdd={() => setModal('ingreso')} onDelete={deleteIngreso} />}
          {page === 'gastos'      && <GastPage t={t} gastos={gastos} mes={mes} ano={ano} onAdd={() => setModal('gasto')} onDelete={deleteGasto} />}
          {page === 'categorias'  && <CatPage t={t} categorias={categorias} gastos={gastos} />}
          {page === 'clientes'    && <CliPage t={t} clientes={clientes} totals={totals} />}
        </div>
      </div>
      {modal === 'ingreso' && <IngresoModal t={t} onClose={() => setModal(null)} onSave={addIngreso} />}
      {modal === 'gasto'   && <GastoModal   t={t} onClose={() => setModal(null)} onSave={addGasto} />}
      {modal === 'auth'    && <AuthModal     t={t} onClose={() => setModal(null)} supaClient={supaClient} />}
      {toast && <Toast t={t} msg={toast.msg} type={toast.type} />}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// SIDEBAR
// ════════════════════════════════════════════════════════════
function Sidebar({ t, page, setPage, currentUser, onLogin, onLogout }) {
  const nav = [
    { sec:'Resumen' },
    { ico:IcoBar,   label:'Dashboard',    key:'dashboard' },
    { ico:IcoTrend, label:'Comparativo',  key:'comparativo' },
    { sec:'Registros' },
    { ico:IcoUp,    label:'Ingresos',     key:'ingresos' },
    { ico:IcoDown,  label:'Gastos',       key:'gastos' },
    { sec:'Análisis' },
    { ico:IcoTag,   label:'Por categoría',key:'categorias' },
    { ico:IcoUser,  label:'Por cliente',  key:'clientes' },
  ];
  const initial = currentUser?.email?.[0]?.toUpperCase() || '?';
  const emailShort = currentUser?.email?.split('@')[0] || '';
  return (
    <aside style={{ background:t.surfaceAlt, borderRight:`1px solid ${t.border}`, padding:'26px 16px',
      display:'flex', flexDirection:'column', gap:4, overflow:'auto' }}>
      <div style={{ padding:'2px 10px 22px', borderBottom:`1px solid ${t.border}`, marginBottom:14 }}>
        <div style={{ fontFamily:"'Fraunces',serif", fontWeight:600, fontSize:22, letterSpacing:'-0.4px', color:t.text, lineHeight:1.05 }}>
          Finanzas<span style={{ fontStyle:'italic', color:t.accent }}> Pro</span>
        </div>

// ── KPI Cards ─────────────────────────────────────────────────
function KPIs({ t, totals, series }) {
  const spark = key => series.slice(-7).map(s => s[key]);
  const cards = [
    { label:'Ingresos · mes', value:totals.ingMes, delta:totals.deltaIng, sparkKey:'ing', color:t.chartA, featured:true },
    { label:'Gastos · mes',   value:totals.gastMes, delta:totals.deltaGast, sparkKey:'gast', color:t.neg, negative:true },
    { label:'Balance del mes',value:totals.balanceMes, sparkKey:null, color:totals.balanceMes>=0 ? t.pos : t.neg },
    { label:'Ingresos año',   value:totals.ingAno, sparkKey:null, color:t.accent },
  ];
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:16 }}>
      {cards.map((c, i) => (
        <div key={i} style={{ background: c.featured ? `linear-gradient(165deg,${t.surface},${t.surfaceAlt} 70%)` : t.surface,
          border:`1px solid ${c.featured ? t.borderStrong : t.border}`, borderRadius:18, padding:22, boxShadow:t.cardShadow, overflow:'hidden' }}>
          <div style={kpiLabel(t)}>{c.label}</div>
          <div style={{ ...kpiVal(t), color:t.text }}>{fmt(c.value)}</div>
          {c.delta !== undefined && (
            <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:10 }}>
              <span style={{ display:'inline-flex', alignItems:'center', gap:3, fontSize:11.5, fontWeight:600,
                color: (c.negative ? c.delta>0 : c.delta>=0) ? t.pos : t.neg,
                background: (c.negative ? c.delta>0 : c.delta>=0) ? t.posSoft : t.negSoft,
                padding:'3px 8px', borderRadius:999 }}>
                {c.delta >= 0 ? '↑' : '↓'} {Math.abs(c.delta).toFixed(1)}%
              </span>
              <span style={{ fontSize:11.5, color:t.muted }}>vs. mes ant.</span>
            </div>
          )}
          {c.sparkKey && series.length > 1 && (
            <div style={{ marginTop:14 }}><Sparkline data={spark(c.sparkKey)} color={c.color} t={t} /></div>
          )}
        </div>
      ))}
    </div>
  );
}

function Sparkline({ data, color, t }) {
  const w = 260, h = 56;
  if (!data || data.length < 2) return null;
  const max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v,i) => [i/(data.length-1)*w, h - ((v-min)/(max-min||1))*(h-6) - 2]);
  const d = 'M' + pts.map(([x,y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' L');
  const area = d + ` L${w},${h} L0,${h} Z`;
  const id = `sp-${color.replace('#','')}-${Math.random().toString(36).slice(2,6)}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" preserveAspectRatio="none" style={{ display:'block', height:48 }}>
      <defs><linearGradient id={id} x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.32"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <path d={area} fill={`url(#${id})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color} stroke={t.surface} strokeWidth="1.5"/>
    </svg>
  );
}

// ── Flow chart ────────────────────────────────────────────────
function FlowChart({ t, series }) {
  if (!series.length) return null;
  const data = series;
  const W=760,H=260,PL=36,PR=12,PT=12,PB=28;
  const iW=W-PL-PR, iH=H-PT-PB;
  const max = Math.max(...data.map(d => Math.max(d.ing,d.gast))) * 1.08 || 1;
  const xs = data.map((_,i) => PL + i/(data.length-1||1)*iW);
  const yI = data.map(d => PT+iH - (d.ing/max)*iH);
  const yG = data.map(d => PT+iH - (d.gast/max)*iH);
  const areaPath = ys => { const t = ys.map((y,i)=>`${xs[i]},${y.toFixed(1)}`).join(' L'); return `M${xs[0]},${PT+iH} L${t} L${xs[xs.length-1]},${PT+iH} Z`; };
  const linePath = ys => 'M' + ys.map((y,i)=>`${xs[i]},${y.toFixed(1)}`).join(' L');
  const yTicks = [0,.25,.5,.75,1].map(p => PT+iH*(1-p));
  return (
    <div style={cardS(t, { padding:24 })}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18 }}>
        <div>
          <div style={{ fontFamily:"'Fraunces',serif", fontSize:22, fontWeight:500, color:t.text }}>Flujo mensual</div>
          <div style={{ fontSize:12.5, color:t.muted, marginTop:4 }}>Ingresos vs gastos por mes</div>
        </div>
        <div style={{ display:'flex', gap:14, alignItems:'center' }}>
          {[{c:t.chartA,l:'Ingresos'},{c:t.chartB,l:'Gastos',dash:true}].map(({c,l,dash})=>(
            <div key={l} style={{ display:'flex', alignItems:'center', gap:6, fontSize:12, color:t.text2 }}>
              {dash ? <span style={{ width:14, borderTop:`2px dashed ${c}` }}/> : <span style={{ width:10,height:10,borderRadius:99,background:c }}/>}
              <span style={{ fontWeight:500 }}>{l}</span>
            </div>
          ))}
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display:'block', overflow:'visible' }}>
        <defs>
          <linearGradient id="fi" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={t.chartA} stopOpacity="0.32"/><stop offset="100%" stopColor={t.chartA} stopOpacity="0"/></linearGradient>
          <linearGradient id="fg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={t.chartB} stopOpacity="0.18"/><stop offset="100%" stopColor={t.chartB} stopOpacity="0"/></linearGradient>
        </defs>
        {yTicks.map((y,i)=><line key={i} x1={PL} x2={W-PR} y1={y} y2={y} stroke={t.grid} strokeDasharray={i===4?'0':'3 5'}/>)}
        {yTicks.map((y,i)=><text key={i} x={PL-8} y={y+4} textAnchor="end" fontSize="10" fill={t.muted} fontFamily="'JetBrains Mono'">{fmtCompact(max*(1-i/4))}</text>)}
        <path d={areaPath(yI)} fill="url(#fi)"/>
        <path d={areaPath(yG)} fill="url(#fg)"/>
        <path d={linePath(yG)} fill="none" stroke={t.chartB} strokeWidth="1.6" strokeDasharray="4 4" strokeLinecap="round"/>
        <path d={linePath(yI)} fill="none" stroke={t.chartA} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
        {data.map((d,i)=>(
          <g key={i}>
            {i===data.length-1 && <circle cx={xs[i]} cy={yI[i]} r="5" fill={t.chartA} stroke={t.surface} strokeWidth="2"/>}
            <text x={xs[i]} y={H-8} textAnchor="middle" fontSize="10.5" fill={t.muted}>{d.mes}</text>
          </g>
        ))}
        {data.length > 0 && (
          <g transform={`translate(${xs[xs.length-1]-58},${yI[yI.length-1]-44})`}>
            <rect width="116" height="32" rx="8" fill={t.text}/>
            <text x="58" y="14" textAnchor="middle" fontSize="9" fill={t.muted} letterSpacing="1.2">{data[data.length-1].mes.toUpperCase()}</text>
            <text x="58" y="26" textAnchor="middle" fontSize="12" fontWeight="600" fill={t.bg} fontFamily="'JetBrains Mono'">{fmt(data[data.length-1].ing)}</text>
          </g>
        )}
      </svg>
    </div>
  );
}

// ── Donut ─────────────────────────────────────────────────────
function Donut({ t, categorias }) {
  if (!categorias.length) return <div style={cardS(t,{padding:24})}><div style={{ fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:500,color:t.text }}>Distribución de gastos</div><div style={{color:t.muted,fontSize:14,marginTop:12}}>Sin datos aún</div></div>;
  const total = categorias.reduce((s,c)=>s+c.total,0);
  let acc=0;
  const R=78,r=50,cx=100,cy=100;
  const arcs = categorias.map(c=>{
    const start=acc/total*Math.PI*2-Math.PI/2; acc+=c.total;
    const end=acc/total*Math.PI*2-Math.PI/2;
    const large=end-start>Math.PI?1:0;
    return { d:`M${cx+R*Math.cos(start)},${cy+R*Math.sin(start)} A${R},${R} 0 ${large} 1 ${cx+R*Math.cos(end)},${cy+R*Math.sin(end)} L${cx+r*Math.cos(end)},${cy+r*Math.sin(end)} A${r},${r} 0 ${large} 0 ${cx+r*Math.cos(start)},${cy+r*Math.sin(start)} Z`, color:c.color };
  });
  return (
    <div style={cardS(t,{padding:24})}>
      <div style={{ fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:500,color:t.text }}>Distribución de gastos</div>
      <div style={{ fontSize:12.5,color:t.muted,marginTop:4 }}>{fmt(total)} acumulado</div>
      <div style={{ display:'flex',alignItems:'center',gap:18,marginTop:14 }}>
        <svg viewBox="0 0 200 200" width="150" height="150" style={{ flexShrink:0 }}>
          {arcs.map((a,i)=><path key={i} d={a.d} fill={a.color} stroke={t.surface} strokeWidth="1.2"/>)}
          <text x="100" y="94" textAnchor="middle" fontSize="10" fill={t.muted} letterSpacing="1">TOTAL</text>
          <text x="100" y="116" textAnchor="middle" fontSize="20" fontFamily="'Fraunces',serif" fontWeight="600" fill={t.text}>{fmtCompact(total)}</text>
        </svg>
        <div style={{ flex:1,display:'flex',flexDirection:'column',gap:6 }}>
          {categorias.map(c=>(
            <div key={c.key} style={{ display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:12.5 }}>
              <span style={{ display:'flex',alignItems:'center',gap:8,color:t.text2 }}>
                <span style={{ width:8,height:8,borderRadius:99,background:c.color }}/>{c.label}
              </span>
              <span style={{ fontFamily:"'JetBrains Mono'",color:t.text,fontWeight:500 }}>{fmtCompact(c.total)}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ComparPage({ t, totals, series }) {
  const stats = [
    { label:'Ingresos totales',value:fmt(totals.ingTotal),sub:'Histórico',color:t.text },
    { label:'Gastos totales',  value:fmt(totals.gastTotal),sub:'Histórico',color:t.neg },
    { label:'Balance general', value:fmt(totals.ingTotal-totals.gastTotal),sub:`Margen ${totals.ingTotal?((totals.ingTotal-totals.gastTotal)/totals.ingTotal*100).toFixed(1):'0'}%`,color:totals.ingTotal>totals.gastTotal?t.pos:t.neg },
    { label:'Balance mes',     value:fmt(totals.balanceMes),sub:'Mes actual',color:totals.balanceMes>=0?t.pos:t.neg },
  ];
  if (!series.length) return <div style={{ color:t.muted,fontSize:14 }}>Sin datos para mostrar</div>;
  const W=940,H=280,PL=44,PR=12,PT=18,PB=30,iW=W-PL-PR,iH=H-PT-PB;
  const max = Math.max(...series.map(d=>Math.max(d.ing,d.gast)))*1.08||1;
  const gW = iW/series.length, bW = (gW-8)/2;
  const yTicks=[0,.25,.5,.75,1].map(p=>PT+iH*(1-p));
  // Balance area
  const balData=series.map(d=>d.ing-d.gast);
  const balMax=Math.max(...balData.map(Math.abs))*1.2||1;
  const bxs=series.map((_,i)=>PL+(i/(series.length-1||1))*iW);
  const bys=balData.map(v=>PT+iH/2 - (v/balMax)*(iH/2));
  const bPath='M'+bxs.map((x,i)=>`${x},${bys[i].toFixed(1)}`).join(' L');
  const bArea=bPath+` L${bxs[bxs.length-1]},${PT+iH/2} L${bxs[0]},${PT+iH/2} Z`;
  // Trend
  const txs=series.map((_,i)=>PL+(i/(series.length-1||1))*(W-PL-PR));
  const tmax=Math.max(...series.map(d=>d.ing))*1.1||1;
  const tys=series.map(d=>PT+iH-(d.ing/tmax)*iH);
  let tPath=`M${txs[0]},${tys[0].toFixed(1)}`;
  for(let i=1;i<txs.length;i++){const cx=(txs[i-1]+txs[i])/2;tPath+=` C${cx},${tys[i-1].toFixed(1)} ${cx},${tys[i].toFixed(1)} ${txs[i]},${tys[i].toFixed(1)}`;}
  const tArea=tPath+` L${txs[txs.length-1]},${PT+iH} L${txs[0]},${PT+iH} Z`;
  return (
    <>
      <div style={{ display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:18 }}>
        {stats.map((s,i)=>(
          <div key={i} style={cardS(t)}>
            <div style={kpiLabel(t)}>{s.label}</div>
            <div style={{...kpiVal(t),color:s.color}}>{s.value}</div>
            <div style={{ fontSize:12,color:t.muted,marginTop:8 }}>{s.sub}</div>
          </div>
        ))}
      </div>
      <div style={cardS(t,{padding:24,marginBottom:18})}>
        <div style={{ fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:500,color:t.text,marginBottom:4 }}>Ingresos vs Gastos por mes</div>
        <div style={{ fontSize:12.5,color:t.muted,marginBottom:12 }}>Comparativa mensual</div>
        <div style={{ overflowX:'auto' }}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ display:'block',minWidth:W,width:'100%' }}>
            <defs>
              <linearGradient id="bi" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={t.chartA} stopOpacity="1"/><stop offset="100%" stopColor={t.chartA} stopOpacity="0.6"/></linearGradient>
              <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={t.chartB} stopOpacity="1"/><stop offset="100%" stopColor={t.chartB} stopOpacity="0.55"/></linearGradient>
            </defs>
            {yTicks.map((y,i)=><line key={i} x1={PL} x2={W-PR} y1={y} y2={y} stroke={t.grid} strokeDasharray={i===4?'0':'3 5'}/>)}
            {yTicks.map((y,i)=><text key={i} x={PL-8} y={y+4} textAnchor="end" fontSize="10" fill={t.muted} fontFamily="'JetBrains Mono'">{fmtCompact(max*(1-i/4))}</text>)}
            {series.map((d,i)=>{
              const gx=PL+i*gW+4;
              const iH2=(d.ing/max)*iH, gH2=(d.gast/max)*iH;
              return <g key={i}>
                <rect x={gx} y={PT+iH-iH2} width={bW} height={iH2} fill="url(#bi)" rx={3}/>
                <rect x={gx+bW+2} y={PT+iH-gH2} width={bW} height={gH2} fill="url(#bg)" rx={3}/>
                <text x={gx+bW+1} y={H-8} textAnchor="middle" fontSize="10.5" fill={t.muted}>{d.mes}</text>
              </g>;
            })}
            <g transform={`translate(${W-PR-180},${PT-6})`}>
              <rect width="180" height="22" rx="11" fill={t.surface} stroke={t.border}/>
              <circle cx="14" cy="11" r="4" fill={t.chartA}/><text x="22" y="14.5" fontSize="11" fill={t.text2} fontWeight="500">Ingresos</text>
              <circle cx="96" cy="11" r="4" fill={t.chartB}/><text x="104" y="14.5" fontSize="11" fill={t.text2} fontWeight="500">Gastos</text>
            </g>
          </svg>
        </div>
      </div>
      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:18 }}>
        <div style={cardS(t,{padding:24})}>
          <div style={{ fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:500,color:t.text,marginBottom:4 }}>Balance neto mensual</div>
          <div style={{ fontSize:12.5,color:t.muted,marginBottom:12 }}>Ingreso − gasto</div>
          <svg viewBox={`0 0 ${W/2} 220`} width="100%" style={{ display:'block' }}>
            <defs><linearGradient id="ba" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={t.pos} stopOpacity="0.32"/><stop offset="100%" stopColor={t.pos} stopOpacity="0"/></linearGradient></defs>
            <line x1={PL} x2={W/2-PR} y1={PT+iH/2} y2={PT+iH/2} stroke={t.border}/>
            <path d={bArea.replace(new RegExp(W.toString(),'g'),(W/2).toString())} fill="url(#ba)"/>
            <path d={bPath.replace(new RegExp(W.toString(),'g'),(W/2).toString())} fill="none" stroke={t.pos} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>
            {series.map((_,i)=><text key={i} x={bxs[i]*(W/2)/W*(W/2)/(W/2)} y={220-8} textAnchor="middle" fontSize="10" fill={t.muted}>{series[i].mes}</text>)}
          </svg>
        </div>
        <div style={cardS(t,{padding:24})}>
          <div style={{ fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:500,color:t.text,marginBottom:4 }}>Tendencia de ingresos</div>
          <div style={{ fontSize:12.5,color:t.muted,marginBottom:12 }}>Evolución suavizada</div>
          <svg viewBox={`0 0 440 220`} width="100%" style={{ display:'block' }}>
            <defs><linearGradient id="ta" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={t.chartA} stopOpacity="0.32"/><stop offset="100%" stopColor={t.chartA} stopOpacity="0"/></linearGradient></defs>
            <path d={tArea} fill="url(#ta)"/>
            <path d={tPath} fill="none" stroke={t.chartA} strokeWidth="2.4" strokeLinecap="round"/>
            {series.map((_,i)=><text key={i} x={txs[i]} y={220-8} textAnchor="middle" fontSize="10" fill={t.muted}>{series[i].mes}</text>)}
          </svg>
        </div>
      </div>
    </>
  );
}

function IngPage({ t, ingresos, mes, ano, onAdd, onDelete }) {

  const periodos = ['todos',...[...new Set(ingresos.map(x=>x.periodo))].sort().reverse()];

  );
}

// CATEGORÍAS PAGE
// ════════════════════════════════════════════════════════════
function CatPage({ t, categorias }) {
  const total = categorias.reduce((s,c)=>s+c.total,0);
  let acc=0;
  const R=92,r=58,cx=120,cy=120;
  const arcs = categorias.map(c=>{
    const start=acc/total*Math.PI*2-Math.PI/2; acc+=c.total;
    const end=acc/total*Math.PI*2-Math.PI/2;
    const large=end-start>Math.PI?1:0;
    return { d:`M${cx+R*Math.cos(start)},${cy+R*Math.sin(start)} A${R},${R} 0 ${large} 1 ${cx+R*Math.cos(end)},${cy+R*Math.sin(end)} L${cx+r*Math.cos(end)},${cy+r*Math.sin(end)} A${r},${r} 0 ${large} 0 ${cx+r*Math.cos(start)},${cy+r*Math.sin(start)} Z`, color:c.color };
  });
  if (!categorias.length) return <div style={{ color:t.muted,fontSize:14 }}>Sin datos de gastos aún</div>;
  return (
    <>
      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,marginBottom:18 }}>
        <div style={cardS(t,{padding:24})}>
          <div style={{ fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:500,color:t.text }}>Distribución acumulada</div>
          <div style={{ fontSize:12.5,color:t.muted,marginTop:4 }}>Todos los períodos</div>
          <div style={{ display:'flex',alignItems:'center',gap:22,marginTop:12 }}>
            <svg viewBox="0 0 240 240" width="200" height="200" style={{ flexShrink:0 }}>
              {arcs.map((a,i)=><path key={i} d={a.d} fill={a.color} stroke={t.surface} strokeWidth="1.5"/>)}
              <text x="120" y="116" textAnchor="middle" fontSize="11" fill={t.muted} letterSpacing="1.4">TOTAL HISTÓRICO</text>
              <text x="120" y="142" textAnchor="middle" fontSize="26" fontFamily="'Fraunces',serif" fontWeight="600" fill={t.text}>{fmtCompact(total)}</text>
            </svg>
            <div style={{ flex:1,display:'flex',flexDirection:'column',gap:8 }}>
              {categorias.map(c=>(
                <div key={c.key} style={{ display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13 }}>
                  <span style={{ display:'flex',alignItems:'center',gap:8,color:t.text2 }}>
                    <span style={{ width:8,height:8,borderRadius:99,background:c.color }}/>{c.label}
                  </span>
                  <span style={{ fontFamily:"'JetBrains Mono'",color:t.text,fontWeight:600 }}>{fmtCompact(c.total)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div style={cardS(t,{padding:24})}>
          <div style={{ fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:500,color:t.text }}>Concentración</div>
          <div style={{ fontSize:12.5,color:t.muted,marginTop:4,marginBottom:16 }}>% del gasto histórico</div>
          <div style={{ display:'flex',flexDirection:'column',gap:14 }}>
            {categorias.map(c=>(
              <div key={c.key}>
                <div style={{ display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6,fontSize:13 }}>
                  <span style={{ display:'flex',alignItems:'center',gap:8,color:t.text,fontWeight:500 }}>
                    <span style={{ width:9,height:9,borderRadius:99,background:c.color }}/>{c.label}
                  </span>
                  <span style={{ display:'flex',alignItems:'baseline',gap:8 }}>
                    <span style={{ fontFamily:"'JetBrains Mono'",color:t.text,fontWeight:600 }}>{fmtCompact(c.total)}</span>
                    <span style={{ color:t.muted,fontSize:11 }}>{c.pct.toFixed(1)}%</span>
                  </span>
                </div>
                <div style={{ height:6,borderRadius:99,background:t.chip }}>
                  <div style={{ width:`${c.pct}%`,height:'100%',background:`linear-gradient(90deg,${c.color},${c.color}cc)`,borderRadius:99 }}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={cardS(t,{padding:0,overflow:'hidden'})}>
        <div style={{ padding:'18px 22px',borderBottom:`1px solid ${t.border}` }}>
          <div style={{ fontFamily:"'Fraunces',serif",fontSize:20,fontWeight:500,color:t.text }}>Resumen por categoría</div>
        </div>
        <table style={tableS}>
          <thead><tr>
            {['Categoría','Este mes','Acumulado año','Total histórico','Registros'].map((h,i)=>(
              <th key={i} style={{ padding:'14px 18px',fontSize:10.5,fontWeight:600,letterSpacing:'0.8px',textTransform:'uppercase',color:t.muted,textAlign:i>0?'right':'left',borderBottom:`1px solid ${t.border}`,background:t.surfaceAlt }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {categorias.map(c=>(
              <tr key={c.key} style={{ borderTop:`1px solid ${t.border}` }}>
                <td style={{ padding:'14px 18px' }}>
                  <span style={{ display:'inline-flex',alignItems:'center',gap:10 }}>
                    <span style={{ width:10,height:10,borderRadius:99,background:c.color }}/>
                    <strong style={{ fontWeight:600,color:t.text }}>{c.label}</strong>
                  </span>
                </td>
                {[c.esteMes,c.esteAno,c.total].map((v,i)=>(
                  <td key={i} style={{ padding:'14px 18px',textAlign:'right',fontFamily:"'JetBrains Mono'",fontWeight:600,color:t.text }}>{fmt(v)}</td>
                ))}
                <td style={{ padding:'14px 18px',textAlign:'right',color:t.muted }}>{c.count}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>
  );
}

function CliPage({ t, clientes, totals }) {
  const palette=[t.chartA,'#c9a878','#a07f55','#dec8a4','#8c6b48','#e6d6b8','#735037'];
  const top=clientes[0];
  if (!clientes.length) return <div style={{ color:t.muted,fontSize:14 }}>Sin clientes registrados aún</div>;
  return (
    <>
      <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:18 }}>
        {[
          { l:'Clientes activos',v:String(clientes.length),sub:'Con pagos registrados' },
          { l:'Cliente principal',v:top?.name||'—',sub:fmt(top?.total||0)+' total',color:t.accent },
          { l:'Promedio por cliente',v:fmt(clientes.length?totals.ingTotal/clientes.length:0),sub:'Acumulado histórico' },
        ].map((s,i)=>(
          <div key={i} style={cardS(t)}>
            <div style={kpiLabel(t)}>{s.l}</div>
            <div style={{...kpiVal(t),color:s.color||t.text,fontSize:s.v.length>12?22:30}}>{s.v}</div>
            <div style={{ fontSize:12,color:t.muted,marginTop:8 }}>{s.sub}</div>
          </div>
        ))}
      </div>
      <div style={cardS(t,{padding:24,marginBottom:18})}>
        <div style={{ fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:500,color:t.text,marginBottom:4 }}>Ranking por ingreso total</div>
        <div style={{ fontSize:12.5,color:t.muted,marginBottom:18 }}>Histórico acumulado</div>
        <div style={{ display:'flex',flexDirection:'column',gap:16 }}>
          {clientes.map((c,i)=>{
            const pct=clientes[0]?c.total/clientes[0].total*100:0;
            return (
              <div key={c.name} style={{ display:'grid',gridTemplateColumns:'30px 1fr 90px',gap:14,alignItems:'center' }}>
                <div style={{ fontFamily:"'Fraunces',serif",fontSize:20,fontWeight:500,color:i<3?t.accent:t.muted,textAlign:'center' }}>{String(i+1).padStart(2,'0')}</div>
                <div>
                  <div style={{ display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6 }}>
                    <span style={{ fontSize:14,fontWeight:600,color:t.text }}>{c.name}</span>
                    <span style={{ fontSize:12,color:t.muted }}>{c.count} pago(s) · último {fmtFecha(c.last)}</span>
                  </div>
                  <div style={{ height:8,borderRadius:99,background:t.chip,overflow:'hidden' }}>
                    <div style={{ width:`${pct}%`,height:'100%',background:`linear-gradient(90deg,${palette[i%palette.length]},${palette[i%palette.length]}cc)`,borderRadius:99 }}/>
                  </div>
                </div>
                <div style={{ fontFamily:"'Fraunces',serif",fontSize:20,fontWeight:500,color:t.text,textAlign:'right' }}>{fmtCompact(c.total)}</div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={cardS(t,{padding:0,overflow:'hidden'})}>
        <div style={{ padding:'18px 22px',borderBottom:`1px solid ${t.border}` }}>
          <div style={{ fontFamily:"'Fraunces',serif",fontSize:20,fontWeight:500,color:t.text }}>Detalle por cliente</div>
        </div>
        <table style={tableS}>
          <thead><tr>
            {['Cliente','Pagos','Último pago','Total recibido','% del total'].map((h,i)=>(
              <th key={i} style={{ padding:'14px 18px',fontSize:10.5,fontWeight:600,letterSpacing:'0.8px',textTransform:'uppercase',color:t.muted,textAlign:i>1?'right':'left',borderBottom:`1px solid ${t.border}`,background:t.surfaceAlt }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {clientes.map(c=>(
              <tr key={c.name} style={{ borderTop:`1px solid ${t.border}` }}>
                <td style={{ padding:'14px 18px' }}><strong style={{ fontWeight:600,color:t.text }}>{c.name}</strong></td>
                <td style={{ padding:'14px 18px',textAlign:'right',color:t.text2 }}>{c.count}</td>
                <td style={{ padding:'14px 18px',color:t.text2 }}>{fmtFecha(c.last)}</td>
                <td style={{ padding:'14px 18px',textAlign:'right',fontFamily:"'JetBrains Mono'",fontWeight:600,color:t.pos }}>{fmt(c.total)}</td>
                <td style={{ padding:'14px 18px',textAlign:'right',color:t.muted }}>{c.pct.toFixed(1)}%</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>
  );
}

function ModalOverlay({ t, onClose, children }) {
  return (
    <div onClick={onClose} style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',backdropFilter:'blur(4px)',
      zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center' }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:t.surface,border:`1px solid ${t.border}`,borderRadius:24,
        padding:'28px 30px',width:520,maxWidth:'95vw',maxHeight:'90vh',overflowY:'auto',
        boxShadow:'0 24px 70px rgba(0,0,0,0.2)' }}>
        {children}
      </div>
    </div>
  );
}

function IngresoModal({ t, onClose, onSave }) {
  const [form, setForm] = useState({ cliente:'', monto:'', fecha:hoy(), periodo:mesPeriodo(), concepto:'', notas:'' });
  const [err, setErr] = useState('');
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const save = () => {
    if (!form.cliente || !form.monto || !form.fecha) { setErr('Completa los campos obligatorios.'); return; }
    const monto = parseFloat(form.monto);
    if (isNaN(monto)||monto<=0) { setErr('Monto inválido.'); return; }
    onSave({ cliente:form.cliente, monto, fecha:form.fecha, periodo:form.periodo||form.fecha.slice(0,7), concepto:form.concepto, notas:form.notas });
  };
  return (
    <ModalOverlay t={t} onClose={onClose}>
      <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20 }}>
        <h3 style={{ fontFamily:"'Fraunces',serif",fontSize:26,color:t.text }}>Registrar Ingreso</h3>
        <button onClick={onClose} style={iconBtn(t)}>{IcoX}</button>
      </div>
      {err && <div style={{ padding:'10px 14px',borderRadius:9,background:t.negSoft,color:t.neg,fontSize:13,marginBottom:14 }}>{err}</div>}
      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:14 }}>
        <div style={{ gridColumn:'1/-1' }}>
          <label style={{ fontSize:13,color:t.text2,fontWeight:500,display:'block',marginBottom:6 }}>Cliente *</label>
          <input value={form.cliente} onChange={set('cliente')} placeholder="Nombre del cliente" style={inputS(t)}/>
        </div>
        <div>
          <label style={{ fontSize:13,color:t.text2,fontWeight:500,display:'block',marginBottom:6 }}>Monto ($) *</label>
          <input value={form.monto} onChange={set('monto')} type="number" placeholder="0.00" min="0" step="0.01" style={inputS(t)}/>
        </div>
        <div>
          <label style={{ fontSize:13,color:t.text2,fontWeight:500,display:'block',marginBottom:6 }}>Fecha *</label>
          <input value={form.fecha} onChange={set('fecha')} type="date" style={inputS(t)}/>
        </div>
        <div>
          <label style={{ fontSize:13,color:t.text2,fontWeight:500,display:'block',marginBottom:6 }}>Período (mes)</label>
          <input value={form.periodo} onChange={set('periodo')} type="month" style={inputS(t)}/>
        </div>
        <div>
          <label style={{ fontSize:13,color:t.text2,fontWeight:500,display:'block',marginBottom:6 }}>Concepto</label>
          <input value={form.concepto} onChange={set('concepto')} placeholder="Descripción del pago" style={inputS(t)}/>
        </div>
        <div style={{ gridColumn:'1/-1' }}>
          <label style={{ fontSize:13,color:t.text2,fontWeight:500,display:'block',marginBottom:6 }}>Notas (opcional)</label>
          <textarea value={form.notas} onChange={set('notas')} placeholder="Información adicional…"
            style={{ ...inputS(t),minHeight:64,resize:'vertical' }}/>
        </div>
      </div>
      <div style={{ display:'flex',gap:10,justifyContent:'flex-end',marginTop:24,paddingTop:20,borderTop:`1px solid ${t.border}` }}>
        <button onClick={onClose} style={{ all:'unset',cursor:'pointer',padding:'9px 18px',borderRadius:12,border:`1px solid ${t.border}`,color:t.text2,fontSize:14,fontWeight:600 }}>Cancelar</button>
        <button onClick={save} style={primaryBtn(t)}>Guardar ingreso</button>
      </div>
    </ModalOverlay>
  );
}

function AuthModal({ t, onClose, supaClient }) {
  const [email, setEmail] = useState('');
  const [sent, setSent] = useState(false);
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const send = async () => {
    if (!email) { setErr('Escribe tu correo.'); return; }
    if (!supaClient) { setErr('Supabase no está disponible.'); return; }
    setLoading(true); setErr('');
    const redirectTo = window.location.href.split('#')[0];
    const { error } = await supaClient.auth.signInWithOtp({ email, options:{ emailRedirectTo: redirectTo } });
    setLoading(false);
    if (error) { setErr(error.message||'No pudimos enviar el acceso.'); return; }
    setSent(true);
  };
  return (
    <ModalOverlay t={t} onClose={onClose}>
      <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20 }}>
        <h3 style={{ fontFamily:"'Fraunces',serif",fontSize:26,color:t.text }}>Acceso a la nube</h3>
        <button onClick={onClose} style={iconBtn(t)}>{IcoX}</button>
      </div>
      {!sent ? (
        <>
          <p style={{ fontSize:14,color:t.text2,marginBottom:20,lineHeight:1.6 }}>
            Ingresa tu correo y te enviaremos un enlace de acceso. Al entrar, tus datos se guardarán y sincronizarán en Supabase.
          </p>
          {err && <div style={{ padding:'10px 14px',borderRadius:9,background:t.negSoft,color:t.neg,fontSize:13,marginBottom:14 }}>{err}</div>}
          <div style={{ marginBottom:20 }}>
            <label style={{ fontSize:13,color:t.text2,fontWeight:500,display:'block',marginBottom:6 }}>Correo electrónico</label>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="tu-correo@ejemplo.com"
              onKeyDown={e=>e.key==='Enter'&&send()} style={inputS(t)}/>
          </div>
          <div style={{ display:'flex',gap:10,justifyContent:'flex-end' }}>
            <button onClick={onClose} style={{ all:'unset',cursor:'pointer',padding:'9px 18px',borderRadius:12,border:`1px solid ${t.border}`,color:t.text2,fontSize:14,fontWeight:600 }}>Cancelar</button>
            <button onClick={send} disabled={loading} style={{ ...primaryBtn(t),opacity:loading?0.7:1 }}>
              {loading ? 'Enviando…' : 'Enviar enlace de acceso'}
            </button>
          </div>
        </>
      ) : (
        <div style={{ textAlign:'center',padding:'20px 0' }}>
          <div style={{ width:56,height:56,borderRadius:'50%',background:t.posSoft,color:t.pos,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:26 }}>✓</div>
          <div style={{ fontFamily:"'Fraunces',serif",fontSize:22,color:t.text,marginBottom:10 }}>Revisa tu correo</div>
          <p style={{ fontSize:14,color:t.text2,lineHeight:1.6 }}>Te enviamos un enlace de acceso a <strong>{email}</strong>. Abre el enlace para iniciar sesión.</p>
          <button onClick={onClose} style={{ ...primaryBtn(t),marginTop:20 }}>Cerrar</button>
        </div>
      )}
    </ModalOverlay>
  );
}

// ── Toast ─────────────────────────────────────────────────────
function Toast({ t, msg, type }) {
  const colors = { ok:[t.posSoft,t.pos], warn:[t.accentBg,t.accent], info:[t.chip,t.text2], error:[t.negSoft,t.neg] };
  const [bg,color] = colors[type]||colors.info;
  return (
    <div style={{ position:'fixed',bottom:24,right:24,padding:'12px 18px',borderRadius:12,
      background:bg,color,border:`1px solid ${color}33`,fontSize:14,fontWeight:500,
      boxShadow:'0 8px 24px rgba(0,0,0,0.12)',zIndex:2000,maxWidth:320 }}>
      {msg}
    </div>
  );
}
